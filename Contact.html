<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Prathik</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Global Styles & Nav - Matching Home Page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lucida Sans', 'Lucida Grande', sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            /* Prevent horizontal scrolling on mobile */
        }

        body {
            background-image: var(--bg-image);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav Animation Support */
        .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: color 0.3s ease;
            font-size: 0.9rem;
            position: relative;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 5px;
            left: 50%;
            background-color: #ff9f43;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-links li a:hover {
            color: #ff9f43;
        }

        .nav-links li a:hover::after {
            width: calc(100% - 40px);
        }

        /* --- Navigation (Identical to Home) --- */
        .my-custom-nav {
            background: var(--nav-bg);
            color: white;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 10px 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        .logo-box {
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-tagline {
            font-size: 0.7rem;
            color: #ccc;
            margin-top: 2px;
            max-width: 200px;
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-links li a:hover {
            color: var(--accent);
        }

        /* Removed inline slideUp since theme.css scroll-observe handles it */

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--glass-shadow-hover);
        }

        h2 {
            margin-bottom: 20px;
            color: var(--heading-color);
        }

        /* Form Styling */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px var(--glass-shadow);
            outline: none;
            touch-action: manipulation;
        }

        input:focus,
        textarea:focus {
            background: var(--card-bg-hover);
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.2);
            transform: translateY(-2px);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .submit-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            padding: 14px;
            border: 2px solid var(--btn-bg);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            touch-action: manipulation;
        }

        .submit-btn:hover {
            background: transparent;
            color: var(--btn-text);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--glass-shadow);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .social-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 5px;
            touch-action: manipulation;
        }

        .social-links a:hover {
            color: var(--btn-text);
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 159, 67, 0.4);
        }

        /* --- Enhanced Paper Plane --- */
        .paper-plane-container {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            display: none;
        }

        .paper-plane-container.active {
            display: block;
            opacity: 1;
        }

        .paper-plane-svg {
            width: 40px;
            height: 40px;
            fill: white;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
            transform-origin: center center;
        }

        /* Flight Animation with Jitter and Banking */
        .fly-motion {
            animation: flightPath 2.2s cubic-bezier(0.15, 0.45, 0.35, 1) forwards;
        }

        @keyframes flightPath {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            10% {
                /* Jitter before launch */
                transform: translate(-2px, 1px) rotate(-5deg) scale(1.05);
            }
            15% {
                transform: translate(2px, -2px) rotate(5deg) scale(1.1);
            }
            30% {
                /* Banking left as it starts curve */
                transform: translate(120px, -180px) rotate(-35deg) scale(1.3);
            }
            60% {
                /* Banking right during mid-flight arc */
                transform: translate(350px, -350px) rotate(-20deg) scale(1);
            }
            100% {
                /* Zooming away into distance */
                transform: translate(800px, -600px) rotate(-45deg) scale(0.2);
                opacity: 0;
            }
        }

        /* Launch Ripple Effect */
        .launch-ripple {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(255, 159, 67, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            animation: rippleOut 0.8s ease-out forwards;
        }

        @keyframes rippleOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(8); opacity: 0; border: 2px solid white; }
        }

        /* Vapor Trail Particles */
        .trail-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9997;
            animation: fadeAndShrink 0.6s ease-out forwards;
        }

        @keyframes fadeAndShrink {
            0% { opacity: 0.8; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(0.2) translateY(10px); }
        }

        @media screen and (max-width: 768px) {
            .logo-box {
                flex: 1;
            }

            .nav-toggle-label {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: 100vh;
                background: rgba(51, 51, 51, 0.98);
                flex-direction: column;
                align-items: center;
                padding-top: 50px;
                transition: 0.4s;
                transform: none;
            }

            .nav-toggle:checked~.nav-links {
                left: 0;
            }

            .nav-toggle-label span,
            .nav-toggle-label span::before,
            .nav-toggle-label span::after {
                display: block;
                background: white;
                height: 2px;
                width: 25px;
                position: relative;
            }

            .nav-toggle-label span::before {
                content: '';
                top: 8px;
            }

            .nav-toggle-label span::after {
                content: '';
                bottom: 10px;
            }

            .glass-card {
                padding: 25px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        @media screen and (max-width: 480px) {
            .globe-container {
                width: 110px;
                height: 110px;
            }
        }

        /* Mobile Menu Logic (Identical to Home) */
        .nav-toggle {
            display: none;
        }

        .nav-toggle-label {
            display: none;
            cursor: pointer;
        }

        @media screen and (max-width: 1024px) {
            .glass-card {
                padding: 30px;
            }
        }

        @media screen and (max-width: 768px) {
            .logo-box {
                flex: 1;
            }

            .nav-toggle-label {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: 100vh;
                background: rgba(51, 51, 51, 0.98);
                flex-direction: column;
                align-items: center;
                padding-top: 50px;
                transition: 0.4s;
                transform: none;
            }

            .nav-toggle:checked~.nav-links {
                left: 0;
            }

            .nav-toggle-label span,
            .nav-toggle-label span::before,
            .nav-toggle-label span::after {
                display: block;
                background: white;
                height: 2px;
                width: 25px;
                position: relative;
            }

            .nav-toggle-label span::before {
                content: '';
                top: 8px;
            }

            .nav-toggle-label span::after {
                content: '';
                bottom: 10px;
            }

            .glass-card {
                padding: 25px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        @media screen and (max-width: 480px) {
            .nav-container {
                padding: 0 10px;
                flex-wrap: nowrap;
            }

            .logo-box {
                flex: 1;
            }

            .logo {
                font-size: 1.1rem;
            }

            .nav-tagline {
                display: none;
            }

            .glass-card {
                padding: 20px;
            }

            h2 {
                font-size: 1.4rem;
            }

            input,
            textarea {
                font-size: 0.9rem;
                padding: 10px;
            }
        }

        footer {
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <video id="dark-bg-video" loop muted playsinline>
        <source src="background-video.mp4" type="video/mp4">
    </video>
    <canvas id="particles-js" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;"></canvas>

    <nav class="my-custom-nav">
        <div class="nav-container">
            <div class="logo-box">
                <div class="logo">Welcome</div>
                <div class="nav-tagline">Just a 19 year old guy passionate about learning new things</div>
            </div>

            <input type="checkbox" id="nav-toggle" class="nav-toggle">

            <ul class="nav-links">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./Education.html">Education</a></li>
                <li><a href="./Projects.html">Projects</a></li>
                <li><a href="./Contact.html">Contact</a></li>
            </ul>

            <label class="theme-switch" title="Toggle Theme">
                <input type="checkbox" id="themeToggleCheckbox">
                <span class="slider round"></span>
            </label>

            <label for="nav-toggle" class="nav-toggle-label">
                <span></span>
            </label>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="glass-card scroll-observe">
            <h2>Get In Touch</h2>
            <form id="contact-form" action="https://formspree.io/f/mdaldzzl" method="POST" class="contact-form">

                <input type="text" name="name" placeholder="Your Name" required>

                <input type="email" name="email" placeholder="Your Email" required>

                <textarea name="message" placeholder="Your Message" required></textarea>

                <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>

                <p id="status-message" style="display: none; font-weight: bold; margin-top: 10px;"></p>
            </form>

            <div class="social-links">
                <a href="https://www.linkedin.com/in/prathik-kontham-b221b2330/">LinkedIn</a>
                <a href="https://github.com/Prath1k">GitHub</a>
                <a href="https://www.instagram.com/_prth.x_/">Instagram</a>
            </div>
        </div>
    </div>

    <!-- Enhanced Paper Plane -->
    <div class="paper-plane-container" id="paperPlaneContainer">
        <svg class="paper-plane-svg" viewBox="0 0 24 24">
            <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
        </svg>
    </div>

    <script>
        var form = document.getElementById("contact-form");
        var planeContainer = document.getElementById("paperPlaneContainer");

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'launch-ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        }

        function createTrail(x, y) {
            const particle = document.createElement('div');
            particle.className = 'trail-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }

        function launchPlane(x, y) {
            // Setup position
            planeContainer.style.left = (x - 20) + 'px';
            planeContainer.style.top = (y - 20) + 'px';
            planeContainer.classList.add('active');

            const planeVisual = planeContainer.querySelector('.paper-plane-svg');
            planeVisual.classList.remove('fly-motion');
            void planeVisual.offsetWidth; // Force reflow
            planeVisual.classList.add('fly-motion');

            // Launch effects
            createRipple(x, y);

            // Particle Trail Loop
            let startTime = performance.now();
            function spawnTrail(timestamp) {
                const elapsed = timestamp - startTime;
                if (elapsed > 2000) return; // End trail after animation

                // Get current motion position via Computed Style (since handled by CSS)
                const style = window.getComputedStyle(planeVisual);
                const matrix = new WebKitCSSMatrix(style.transform);
                
                // Absolute positions + matrix translate
                const px = (x - 20) + matrix.m41 + 10;
                const py = (y - 20) + matrix.m42 + 20;

                createTrail(px, py);
                requestAnimationFrame(spawnTrail);
            }
            requestAnimationFrame(spawnTrail);

            setTimeout(() => {
                planeContainer.classList.remove('active');
            }, 2300);
        }

        async function handleSubmit(event) {
            event.preventDefault();
            var status = document.getElementById("status-message");
            var submitBtn = document.getElementById('submit-btn');
            var data = new FormData(event.target);

            const rect = submitBtn.getBoundingClientRect();
            const launchX = rect.left + rect.width / 2;
            const launchY = rect.top;

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    launchPlane(launchX, launchY);

                    status.innerHTML = "✨ Message sent successfully!";
                    status.style.display = 'block';
                    status.style.color = '#22c55e';
                    form.reset();

                    setTimeout(() => {
                        status.style.display = 'none';
                    }, 5000);
                } else {
                    response.json().then(data => {
                        status.innerHTML = data.errors ? data.errors.map(e => e.message).join(", ") : "Submission failed";
                        status.style.display = 'block';
                        status.style.color = 'red';
                    })
                }
            }).catch(() => {
                status.innerHTML = "Oops! Problem submitting form";
                status.style.display = 'block';
                status.style.color = 'red';
            });
        }

        form.addEventListener("submit", handleSubmit);
    </script>
    <footer>@2026 all rights reserved to prathik.</footer>

    <script src="scripts.js"></script>
</body>

</html>
