<head>

    <link rel="stylesheet" href="theme.css">
    <style>
        /* Global Styles & Nav - Matching Home Page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lucida Sans', 'Lucida Grande', sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            /* Prevent horizontal scrolling on mobile */
        }

        body {
            background-image: var(--bg-image);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav Animation Support */
        .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: color 0.3s ease;
            font-size: 0.9rem;
            position: relative;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 5px;
            left: 50%;
            background-color: var(--accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-links li a:hover {
            color: var(--accent);
        }

        .nav-links li a:hover::after {
            width: calc(100% - 40px);
        }

        /* --- Navigation (Identical to Home) --- */
        .my-custom-nav {
            background: var(--nav-bg);
            color: white;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 10px 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        .logo-box {
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-tagline {
            font-size: 0.7rem;
            color: #ccc;
            margin-top: 2px;
            max-width: 200px;
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-links li a:hover {
            color: var(--accent);
        }

        /* Removed inline slideUp since theme.css scroll-observe handles it */

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--glass-shadow-hover);
        }

        h2 {
            margin-bottom: 20px;
            color: var(--heading-color);
        }

        /* Form Styling */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px var(--glass-shadow);
            outline: none;
            touch-action: manipulation;
        }

        input:focus,
        textarea:focus {
            background: var(--card-bg-hover);
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .submit-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            padding: 14px;
            border: 2px solid var(--btn-bg);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            touch-action: manipulation;
        }

        .submit-btn:hover {
            background: transparent;
            color: var(--btn-text);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--glass-shadow);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .social-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 5px;
            touch-action: manipulation;
        }

        .social-links a:hover { color: var(--accent); }

        /* Mobile Menu Logic (Identical to Home) */
        .nav-toggle {
            display: none;
        }

        .nav-toggle-label {
            display: none;
            cursor: pointer;
        }

        @media screen and (max-width: 1024px) {
            .glass-card {
                padding: 30px;
            }
        }

        @media screen and (max-width: 768px) {
            .nav-toggle-label { display: block; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background: var(--nav-bg);
                flex-direction: column;
                align-items: center;
                padding-top: 50px;
                transition: 0.4s;
                transform: none;
                gap: 30px;
                z-index: 999;
                overflow-y: auto;
            }

            .nav-links li a {
                font-size: 1.2rem;
                padding: 15px 30px;
            }

            .nav-toggle:checked~.nav-links {
                left: 0;
            }

            .nav-toggle-label span,
            .nav-toggle-label span::before,
            .nav-toggle-label span::after {
                display: block;
                background: white;
                height: 2px;
                width: 25px;
                position: relative;
                transition: transform 0.3s ease-in-out, background 0.3s ease-in-out, top 0.3s ease-in-out, bottom 0.3s ease-in-out;
            }
            .nav-toggle-label span::before { content: ''; top: 8px; }
            .nav-toggle-label span::after { content: ''; bottom: 10px; }

            .nav-toggle:checked ~ .nav-toggle-label span {
                background: transparent;
            }
            .nav-toggle:checked ~ .nav-toggle-label span::before {
                top: 0;
                transform: rotate(45deg);
            }
            .nav-toggle:checked ~ .nav-toggle-label span::after {
                bottom: 0;
                transform: rotate(-45deg);
            }
        }

        @media screen and (max-width: 480px) {
            .nav-container { padding: 0 10px; flex-wrap: nowrap; }
            .logo-box { flex: 1; }
            .logo { font-size: 1.1rem; }
            .nav-tagline { display: none; }
            .glass-card { padding: 25px 15px; }
            .paper-plane-svg { width: 50px; height: 50px; }
            .theme-switch {
                margin-left: auto;
                margin-right: 15px;
                transform: scale(0.85);
            }
        }

        footer {
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Paper Plane Animation */
        .paper-plane-container {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
        }

        .paper-plane-svg {
            width: 80px;
            height: 80px;
            fill: white;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 30px rgba(255, 255, 255, 0.5));
        }

        @keyframes paperPlaneFlying {
            0% {
                transform: translate(0, 0) rotate(-15deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(calc(100vw - 100px), calc(-100vh + 100px)) rotate(20deg) scale(0);
                opacity: 0;
            }
        }

        .paper-plane-svg.flying {
            animation: paperPlaneFlying 1.5s ease-in forwards !important;
        }
    </style>
</head>

<body>
    <video id="dark-bg-video" loop muted playsinline>

    <canvas id="particles-js" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;"></canvas>

    <nav class="my-custom-nav">

            <ul class="nav-links">

            <label class="theme-switch" title="Toggle Theme">

    <div class="main-wrapper">
        <div class="glass-card scroll-observe">
            <h2>Get In Touch</h2>
           <form id="contact-form" action="https://formspree.io/f/mdaldzzl" method="POST" class="contact-form">
    
    <input type="text" name="name" placeholder="Your Name" required>
    
    <input type="email" name="email" placeholder="Your Email" required>
    
    <textarea name="message" placeholder="Your Message" required></textarea>
    
    <button type="submit" class="submit-btn">Send Message</button>

                <p id="status-message" style="display: none; font-weight: bold; margin-top: 10px;"></p>
            </form>

            <div class="social-links">
                <a href="https://www.linkedin.com/in/prathik-kontham-b221b2330/">LinkedIn</a>
                <a href="https://github.com/Prath1k">GitHub</a>
                <a href="https://www.instagram.com/_prth.x_/">Instagram</a>
            </div>
        </div>
    </div>

    <!-- Paper Plane Animation -->
    <div class="paper-plane-container" id="paperPlaneContainer">
        <svg class="paper-plane-svg" viewBox="0 0 24 24">
            <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
        </svg>
    </div>

    <script>
    const form = document.getElementById("contact-form");
    
    async function handleSubmit(event) {
        event.preventDefault(); // Stops the page from reloading
        const status = document.getElementById("status-message");
        const data = new FormData(event.target);
        
        try {
            const response = await fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            if (response.ok) {
                status.innerHTML = "Thanks for your submission!";
                status.style.display = 'block';
                status.style.color = 'green';
                form.reset(); // Clears the form inputs
                
                // Get the send button position
                const submitBtn = event.target.querySelector('.submit-btn');
                const btnRect = submitBtn.getBoundingClientRect();
                
                // Position paper plane at button location
                const paperPlaneContainer = document.getElementById('paperPlaneContainer');
                const paperPlane = document.querySelector('.paper-plane-svg');
                
                // Reset animation class for multiple submissions
                paperPlane.classList.remove('flying');
                void paperPlane.offsetWidth; // Trigger reflow to restart animation
                
                paperPlaneContainer.style.left = btnRect.left + 'px';
                paperPlaneContainer.style.top = btnRect.top + 'px';
                paperPlaneContainer.style.opacity = '1';
                
                // Trigger flying animation
                paperPlane.classList.add('flying');
                
                // Hide it again after animation
                setTimeout(() => {
                    paperPlaneContainer.style.opacity = '0';
                }, 1500);
            } else {
                const responseData = await response.json();
                if (Object.prototype.hasOwnProperty.call(responseData, 'errors')) {
                    status.innerHTML = responseData["errors"].map(error => error["message"]).join(", ");
                } else {
                    status.innerHTML = "Oops! There was a problem submitting your form";
                }
                status.style.display = 'block';
                status.style.color = 'red';
            }
        } catch (error) {
            status.innerHTML = "Oops! There was a problem submitting your form";
            status.style.display = 'block';
            status.style.color = 'red';
        }
    }
    
    form.addEventListener("submit", handleSubmit);
</script>
